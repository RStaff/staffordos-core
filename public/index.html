<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StaffordOS Command Center</title>

<style>
body{
font-family:system-ui;
background:#0b1220;
color:white;
margin:0;
padding:40px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#131c33;
padding:20px;
border-radius:10px;
}

.metric{
font-size:28px;
font-weight:700;
}

.label{
opacity:.7;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #1e2a4a;
}

button{
background:#4c6fff;
border:none;
padding:10px 16px;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>StaffordOS Command Center</h1>

<div class="grid">
<div class="card">
<div class="label">Total Merchants</div>
<div id="merchants" class="metric">--</div>
</div>

<div class="card">
<div class="label">Recovered Revenue</div>
<div id="revenue" class="metric">$--</div>
</div>

<div class="card">
<div class="label">Recovered Carts</div>
<div id="carts" class="metric">--</div>
</div>

<div class="card">
<div class="label">Abandoned Carts</div>
<div id="messages" class="metric">--</div>
</div>

<div class="card">
<div class="label">Email Revenue</div>
<div id="emailRevenue" class="metric">$--</div>
</div>

<div class="card">
<div class="label">SMS Revenue</div>
<div id="smsRevenue" class="metric">$--</div>
</div>
</div>

<h2>Merchant Status</h2>

<table>
<thead>
<tr>
<th>Status</th>
<th>Count</th>
<th>Revenue</th>
</tr>
</thead>

<tbody id="merchantTable">
</tbody>
</table>

<h2>Live Activity</h2>
<div id="liveActivity" style="display:flex;flex-direction:column;gap:12px;margin-top:20px;"></div>

<script src="/socket.io/socket.io.js"></script>
<script>


let socket = null
let currentRevenueCents = 0
let currentRecovered = 0
let currentAbandoned = 0
let currentEmailRevenueCents = 0
let currentSmsRevenueCents = 0
const seenRecoveryEventIds = new Set()

function fmtMoney(cents){
  return "$" + ((Number(cents || 0) / 100).toFixed(0))
}

function fmtRelativeTime(v){
  if(!v) return "just now"
  const d = new Date(v)
  if(Number.isNaN(d.getTime())) return String(v)
  const diffSec = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000))
  const diffMin = Math.floor(diffSec / 60)
  const diffHr = Math.floor(diffMin / 60)
  if(diffSec < 10) return "just now"
  if(diffSec < 60) return diffSec + " sec ago"
  if(diffMin < 60) return diffMin + " min ago"
  if(diffHr < 24) return diffHr + " hour" + (diffHr === 1 ? "" : "s") + " ago"
  return d.toLocaleString()
}

function prependLiveActivity(ev){
  const wrap = document.getElementById("liveActivity")
  if(!wrap) return

  const card = document.createElement("div")
  card.style.border = "1px solid #1e2a4a"
  card.style.borderRadius = "12px"
  card.style.padding = "14px"
  card.style.background = "#131c33"

  const money = Number(ev.recoveredRevenueCents || ev.cartValueCents || 0)

  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px;">
      <div style="font-weight:800;">${fmtMoney(money)} recovered</div>
      <div style="opacity:.72;">${fmtRelativeTime(ev.recoveredAt || ev.createdAt)}</div>
    </div>
    <div style="opacity:.9;">${ev.shopDomain || "unknown shop"} via ${ev.channel || "email"} · ${ev.playbook || "playbook"}</div>
    <div style="opacity:.72;margin-top:6px;">Cart: ${ev.cartId || "—"} · Order: ${ev.orderId || "—"}</div>
  `

  wrap.prepend(card)

  while (wrap.children.length > 8) {
    wrap.removeChild(wrap.lastChild)
  }
}


async function refreshChannelCards(){
  const channelRes = await fetch("/abando/analytics/channel-summary")
  const channelData = await channelRes.json()

  const emailRow = (channelData.channels || []).find(c => String(c.channel || "").toLowerCase() === "email")
  const smsRow = (channelData.channels || []).find(c => String(c.channel || "").toLowerCase() === "sms")

  currentEmailRevenueCents = emailRow ? Number(emailRow.recovered_revenue_cents || 0) : 0
  currentSmsRevenueCents = smsRow ? Number(smsRow.recovered_revenue_cents || 0) : 0

  const emailEl = document.getElementById("emailRevenue")
  const smsEl = document.getElementById("smsRevenue")
  if (emailEl) emailEl.innerText = fmtMoney(currentEmailRevenueCents)
  if (smsEl) smsEl.innerText = fmtMoney(currentSmsRevenueCents)
}

function connectFounderSocket(){
  if(typeof io === "undefined"){
    console.warn("Socket.IO client not loaded")
    return
  }

  socket = io()

  socket.on("connect", () => {
    socket.emit("subscribe:founder")
    console.log("[founder-socket] connected", socket.id)
  })

  socket.on("recovery_event_created", async (payload) => {
    const ev = payload && payload.recoveryEvent ? payload.recoveryEvent : payload
    if(!ev) return
    if(ev.id && seenRecoveryEventIds.has(ev.id)) return
    if(ev.id) seenRecoveryEventIds.add(ev.id)

    const addedRevenue = Number(ev.recoveredRevenueCents || ev.cartValueCents || 0)
    currentRevenueCents += addedRevenue
    currentRecovered += String(ev.status || "").toLowerCase() === "recovered" ? 1 : 0
    currentAbandoned = Math.max(currentAbandoned, currentRecovered)

    document.getElementById("revenue").innerText = fmtMoney(currentRevenueCents)
    document.getElementById("carts").innerText = currentRecovered
    document.getElementById("messages").innerText = currentAbandoned

    const liveChannel = String(ev.channel || "email").toLowerCase()
    if (liveChannel === "sms") {
      currentSmsRevenueCents += addedRevenue
    } else {
      currentEmailRevenueCents += addedRevenue
    }

    const emailEl = document.getElementById("emailRevenue")
    const smsEl = document.getElementById("smsRevenue")
    if (emailEl) emailEl.innerText = fmtMoney(currentEmailRevenueCents)
    if (smsEl) smsEl.innerText = fmtMoney(currentSmsRevenueCents)

    await refreshChannelCards()

    prependLiveActivity(ev)
  })
}


async function loadAnalytics(){

const res = await fetch("/abando/analytics/overview")
const data = await res.json()

const founderRes = await fetch("/abando/analytics/founder-metrics")
const founderData = await founderRes.json()

document.getElementById("merchants").innerText =
founderData.metrics?.total_merchants ?? data.overview.total_merchants ?? 0

currentRevenueCents = Number(founderData.metrics?.total_revenue_cents || 0)
currentRecovered = Number(founderData.metrics?.total_carts_recovered || 0)
currentAbandoned = Number(founderData.metrics?.total_carts_abandoned || 0)

document.getElementById("revenue").innerText =
fmtMoney(currentRevenueCents)

document.getElementById("carts").innerText =
currentRecovered

document.getElementById("messages").innerText =
currentAbandoned

const table = document.getElementById("merchantTable")

table.innerHTML=""

data.merchantMix.forEach(m=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${m.status}</td>
<td>${m.count}</td>
<td>—</td>
`

table.appendChild(tr)

})

const channelRes = await fetch("/abando/analytics/channel-summary")
const channelData = await channelRes.json()

const emailRow = (channelData.channels || []).find(c => String(c.channel || "").toLowerCase() === "email")
const smsRow = (channelData.channels || []).find(c => String(c.channel || "").toLowerCase() === "sms")

document.getElementById("emailRevenue").innerText =
fmtMoney(emailRow ? Number(emailRow.recovered_revenue_cents || 0) : 0)

document.getElementById("smsRevenue").innerText =
fmtMoney(smsRow ? Number(smsRow.recovered_revenue_cents || 0) : 0)

const activity = document.getElementById("liveActivity")
if (activity) {
  activity.innerHTML = ""

  ;(data.recentStats || []).forEach(stat => {
    if (stat && stat.id) seenRecoveryEventIds.add(stat.id)
    prependLiveActivity({
      shopDomain: stat.shopDomain,
      cartId: "—",
      orderId: "—",
      recoveredRevenueCents: stat.revenueRecoveredCents || 0,
      recoveredAt: stat.updatedAt || stat.createdAt,
      createdAt: stat.createdAt,
      playbook: "daily_stat",
      status: "recovered",
    })
  })
}

}

loadAnalytics()
connectFounderSocket()

</script>

</body>
</html>
